<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rich Matrix green gradient with depth -->
    <linearGradient id="depthGreen" x1="30%" y1="20%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#A0FFCC"/>
      <stop offset="50%" stop-color="#00FF9F"/>
      <stop offset="100%" stop-color="#00CC66"/>
    </linearGradient>

    <!-- Strong multi-layer glow for depth -->
    <filter id="deepGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="glow1"/>
      <feGaussianBlur stdDeviation="8" result="glow2"/>
      <feMerge>
        <feMergeNode in="glow2"/>
        <feMergeNode in="glow1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep black background -->
  <rect width="280" height="280" fill="#020402"/>

  <!-- Subtle vertical digital rain lines for Matrix atmosphere -->
  <g opacity="0.22">
    <line x1="38" y1="25" x2="38" y2="255" stroke="#00FF9F" stroke-width="2"/>
    <line x1="72" y1="25" x2="72" y2="255" stroke="#00FF9F" stroke-width="1"/>
    <line x1="205" y1="25" x2="205" y2="255" stroke="#00FF9F" stroke-width="1"/>
    <line x1="242" y1="25" x2="242" y2="255" stroke="#00FF9F" stroke-width="2"/>
  </g>

  <!-- Deep shadow layer for 3D depth -->
  <text 
    x="141" 
    y="157" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="Impact, Arial Black, sans-serif" 
    font-size="122" 
    font-weight="900" 
    fill="#001A0F" 
    stroke="#001A0F" 
    stroke-width="18" 
    letter-spacing="-9"
    paint-order="stroke fill">YSN</text>

  <!-- Mid-tone bevel layer -->
  <text 
    x="139" 
    y="153" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="Impact, Arial Black, sans-serif" 
    font-size="122" 
    font-weight="900" 
    fill="#003322" 
    stroke="#00CC66" 
    stroke-width="9" 
    letter-spacing="-9"
    paint-order="stroke fill">YSN</text>

  <!-- Main vibrant glowing layer with depth -->
  <text 
    x="140" 
    y="152" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="Impact, Arial Black, sans-serif" 
    font-size="122" 
    font-weight="900" 
    fill="url(#depthGreen)" 
    stroke="#00FF9F" 
    stroke-width="6" 
    filter="url(#deepGlow)"
    letter-spacing="-9"
    paint-order="stroke fill">YSN</text>

  <!-- Bright highlight edge for extra depth & pop -->
  <text 
    x="140" 
    y="150" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="Impact, Arial Black, sans-serif" 
    font-size="122" 
    font-weight="900" 
    fill="#E0FFEE" 
    opacity="0.75"
    letter-spacing="-9">YSN</text>

  <!-- Thin energy scan line -->
  <rect x="52" y="192" width="176" height="4" rx="2" fill="#00FF9F" opacity="0.75"/>
</svg>
